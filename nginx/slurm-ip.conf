# Nginx config for demo deployment using a bare VPS IP (no domain, no HTTPS).
# Deploy to: /etc/nginx/sites-available/slurm
# Enable with: ln -s /etc/nginx/sites-available/slurm /etc/nginx/sites-enabled/slurm
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name _;   # match any IP or hostname

    # ── Simulator UI (oncall training) — root ───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Grafana dashboards ───────────────────────────────────────────────
    location /grafana/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Grafana websockets (live dashboard updates)
    location /grafana/api/live/ {
        proxy_pass         http://127.0.0.1:3000/api/live/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Prometheus ───────────────────────────────────────────────────────
    location /prometheus/ {
        proxy_pass       http://127.0.0.1:9090/;
        proxy_set_header Host $host;
    }

    # ── AlertManager ─────────────────────────────────────────────────────
    location /alertmanager/ {
        proxy_pass       http://127.0.0.1:9093/;
        proxy_set_header Host $host;
    }

    # ── Override / explain API ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8002/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
