# Nginx server block for the GPU Fleet Failure Classifier.
# Deploy to: /etc/nginx/sites-available/slurm
# Enable with: ln -s /etc/nginx/sites-available/slurm /etc/nginx/sites-enabled/slurm
#
# Prerequisites:
#   1. Register a DuckDNS subdomain (e.g. slurmgpu.duckdns.org) pointing to this VPS IP.
#   2. Run: certbot --nginx -d slurmgpu.duckdns.org
#      Certbot will fill in the ssl_certificate paths below automatically.
#   3. Run: nginx -t && systemctl reload nginx

server {
    listen 443 ssl;
    server_name slurmgpu.duckdns.org;   # <-- change to your actual subdomain

    ssl_certificate     /etc/letsencrypt/live/slurmgpu.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slurmgpu.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Simulator UI (oncall training) — root ───────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Grafana dashboards ───────────────────────────────────────────────
    # GF_SERVER_SERVE_FROM_SUB_PATH=true is set in docker-compose so
    # Grafana handles the /grafana prefix internally.
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Prometheus ───────────────────────────────────────────────────────
    location /prometheus/ {
        proxy_pass http://127.0.0.1:9090/;
        proxy_set_header Host $host;
    }

    # ── AlertManager ─────────────────────────────────────────────────────
    location /alertmanager/ {
        proxy_pass http://127.0.0.1:9093/;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name slurmgpu.duckdns.org;   # <-- change to match above
    return 301 https://$host$request_uri;
}
