global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: P1
      receiver: p1-pagerduty
      continue: true
    - match:
        severity: P1
      receiver: p1-slack
    - match:
        severity: P2
      receiver: p2-pagerduty
      continue: true
    - match:
        severity: P2
      receiver: p2-slack
    - match:
        severity: P3
      receiver: p3-slack
    - match:
        severity: P4
      receiver: p4-slack

receivers:
  - name: default
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER'
        channel: '#gpu-alerts'

  - name: p1-pagerduty
    pagerduty_configs:
      - service_key: PLACEHOLDER_P1_SERVICE_KEY

  - name: p1-slack
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER'
        channel: '#gpu-critical'
        title: '[P1 CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: p2-pagerduty
    pagerduty_configs:
      - service_key: PLACEHOLDER_P2_SERVICE_KEY

  - name: p2-slack
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER'
        channel: '#gpu-alerts'
        title: '[P2 HIGH] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: p3-slack
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER'
        channel: '#gpu-alerts'
        title: '[P3 MEDIUM] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: p4-slack
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER'
        channel: '#gpu-notifications'
        title: '[P4 LOW] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  - source_match:
      severity: P1
    target_match:
      severity: P2
    equal: ['alertname']
  - source_match:
      severity: P2
    target_match:
      severity: P3
    equal: ['alertname']
